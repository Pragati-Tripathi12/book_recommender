<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results | BookBuddy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f1f3f5; font-family: 'Poppins', sans-serif; }
        .navbar { background-color: #2c3e50; }
        .result-header { padding: 40px 0; background: #fff; border-bottom: 1px solid #ddd; }
        .card { border-radius: 12px; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .card-img-top { height: 250px; object-fit: contain; padding: 10px; background: #fafafa; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark p-3">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">📚 BOOKBUDDY</a>
    </div>
</nav>

<div class="result-header text-center">
    <div class="container">
        <h2>Recommended For You</h2>
        <p class="text-muted">Based on your interest, we think you'll love these:</p>
        <a href="/" class="btn btn-outline-secondary btn-sm rounded-pill mt-2">← Back to Home</a>
    </div>
</div>

<div class="container mt-5">
    <div class="row">
        {% if data %}
            {% for i in data %}
            <div class="col-lg-3 col-md-4 col-sm-6 mb-4">
                <div class="card h-100">
                    <img src="{{ i[2] }}" class="card-img-top" alt="book cover">
                    <div class="card-body">
                        <h6 class="card-title fw-bold text-truncate">{{ i[0] }}</h6>
                        <p class="card-text small text-secondary">{{ i[1] }}</p>
                    </div>
                </div>
            </div>
            {% endfor %}
        {% else %}
            <div class="col-12 text-center">
                <h4>No recommendations found. Try a different book title!</h4>
            </div>
        {% endif %}
    </div>
</div>

</body>
</html>
