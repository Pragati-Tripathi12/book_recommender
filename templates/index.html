<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookBuddy | Explore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Poppins', sans-serif; }
        .navbar { background-color: #2c3e50; }
        .hero { 
            background: linear-gradient(45deg, #2c3e50, #4ca1af); 
            color: white; padding: 60px 0; text-align: center; 
        }
        .search-box { 
            background: white; padding: 20px; border-radius: 50px; 
            margin-top: -40px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .book-card { 
            border: none; border-radius: 15px; transition: 0.3s; height: 100%;
            background: white; overflow: hidden;
        }
        .book-card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .card-img-top { height: 280px; object-fit: cover; border-bottom: 3px solid #4ca1af; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark p-3">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">📚 BOOKBUDDY</a>
    </div>
</nav>

<div class="hero">
    <h1 class="display-5 fw-bold">Find Your Next Adventure</h1>
    <p>Discover the most popular books or search for something specific.</p>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 search-box">
            <form action="/recommend_books" method="post" class="d-flex">
                <input name="user_input" class="form-control border-0 bg-transparent" type="search" placeholder="Enter a book title..." required>
                <button class="btn btn-primary px-4 rounded-pill" type="submit">Search</button>
            </form>
        </div>
    </div>

    <div class="row mt-5">
        <h3 class="mb-4 fw-bold">Trending Today</h3>
        {% for i in range(book_name|length) %}
        <div class="col-lg-3 col-md-4 col-sm-6 mb-4">
            <div class="card book-card">
                <img src="{{ image[i] }}" class="card-img-top" alt="cover">
                <div class="card-body">
                    <h6 class="fw-bold text-truncate">{{ book_name[i] }}</h6>
                    <p class="small text-muted mb-1">{{ author[i] }}</p>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="badge bg-light text-dark border">⭐ {{ rating[i] }}</span>
                        <small class="text-secondary">{{ votes[i] }} votes</small>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
